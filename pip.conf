# ============================================================
# pip 설정 – Nexus PyPI 프록시 (폐쇄망 환경)
#
# 사용법:
#   1) 이 파일을 ~/.config/pip/pip.conf 또는 /etc/pip.conf 에 복사
#   2) Nexus 주소를 실제 환경에 맞게 수정
#   3) Nexus 에 PyPI Proxy 저장소(pypi-proxy)를 먼저 생성해야 합니다
# ============================================================
[global]
index-url = http://nexus:8081/repository/pypi-proxy/simple/
trusted-host = nexus
